name: Workflow Friction
description: Report where OpsProbe slows you down, confuses you, or breaks your real workflow.
title: "[Workflow Friction] "
labels:
  - feedback
body:
  - type: markdown
    attributes:
      value: |
        Use this form when OpsProbe does not fit your real inspection workflow, even if no single check is "missing".
  - type: textarea
    id: task
    attributes:
      label: Task you were trying to complete
      description: What were you trying to do from start to finish?
      placeholder: Configure a host, run a template, export a manager report, and hand it to my supervisor.
    validations:
      required: true
  - type: textarea
    id: where_it_broke
    attributes:
      label: Where it became painful
      description: Which step caused confusion, rework, or abandonment?
      placeholder: The report export path was clear, but I was not sure which report variant to choose or how to give product feedback.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected instead
      description: Describe the workflow that would feel natural to you.
      placeholder: I expected a built-in feedback panel with direct links for report feedback and missing checks.
    validations:
      required: true
  - type: dropdown
    id: frequency
    attributes:
      label: How often does this happen?
      options:
        - Every time
        - Often
        - Sometimes
        - Only once so far
    validations:
      required: true
  - type: textarea
    id: workaround
    attributes:
      label: Current workaround
      description: How are you getting past this problem today?
      placeholder: I keep notes separately and plan to open a GitHub issue later.
    validations:
      required: false
